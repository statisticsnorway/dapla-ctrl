query UserTeams @cache(policy: CacheAndNetwork) {
	me {
		__typename
		... on User {
			teams(first: 25) @paginate(mode: SinglePage) {
				pageInfo {
					hasNextPage
					hasPreviousPage
					pageEnd
					pageStart
					startCursor
					endCursor
					totalCount
				}
				nodes {
					team {
						id
						slug
						purpose
						section {
							code
							name
							manager {
								name
								email
							}
						}
						members {
							pageInfo {
								totalCount
							}
						}
						groups {
							nodes {
								name
								category
								suffix
								members {
									nodes {
										user {
											name
											email
										}
									}
								}
							}
						}
					}
				}
			}
		}
	}
}
