query Groups($team: Slug!) {
	team(slug: $team) {
		id
		slug
		members(first: 25) @paginate(mode: SinglePage) {
			pageInfo {
				totalCount
				hasNextPage
				hasPreviousPage
				pageStart
				pageEnd
				startCursor
				endCursor
			}
			nodes {
				groups {
					id
					name
					category
					suffix
				}
				user {
					id
					name
					email
					section {
						id
						name
						code
					}
				}
			}
		}
	}
}
