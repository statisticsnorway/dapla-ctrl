name: Build and push image
on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
  NAME: dapla-console
jobs:
  build_push:
    permissions:
      contents: 'read'
      id-token: 'write'
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run check
      - name: Run tests
        run: pnpm test --run
      - name: Build and push image and SBOM to Nais OCI registry
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: dapla-platform
