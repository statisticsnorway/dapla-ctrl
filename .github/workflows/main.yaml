name: Build and push image
on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
  NAME: dapla-console
jobs:
  build_push:
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      nais-tag: ${{steps.nais-deploy-vars.outputs.nais_tag}}
      nais-cluster: ${{steps.nais-deploy-vars.outputs.cluster}}
      nais-config-path: ${{steps.nais-deploy-vars.outputs.nais_config_path}}
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #v5.0.0
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run check
      - name: Run tests
        run: pnpm test --run
      - name: Build and push image and SBOM to Nais OCI registry
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: dapla-platform

    # TODO: deploy to preview
