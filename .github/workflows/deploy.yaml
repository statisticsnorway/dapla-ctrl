name: Deploy to nais-test

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: "Which version should be deployed"


permissions:
  contents: read
  id-token: write

jobs:
  build_and_push_keycloak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Nais
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: nais-test
          RESOURCE: .nais/nais.yaml
          VAR: image=europe-north1-docker.pkg.dev/nais-management-b3a7/dapla-platform/dapla-api:${{ github.event.inputs.image_version }}
