name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      api:
        description: Build api
        type: boolean
        default: false
      frontend:
        description: Build frontend
        type: boolean
        default: false
      reconcilers:
        description: Build reconcilers
        type: boolean
        default: false
      labradoor:
        description: Build labradoor
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      reconcilers: ${{ steps.filter.outputs.reconcilers }}
      labradoor: ${{ steps.filter.outputs.labradoor }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            api="${{ inputs.api }}"
            frontend="${{ inputs.frontend }}"
            reconcilers="${{ inputs.reconcilers }}"
            labradoor="${{ inputs.labradoor }}"

            {
              echo "api=$api"
              echo "frontend=$frontend"
              echo "reconcilers=$reconcilers"
              echo "labradoor=$labradoor"
            } >> "$GITHUB_OUTPUT"

            {
              echo "## Triggered build for service"
              echo
              echo "| Service | Build |"
              echo "| --- | --- |"
              echo "| API | $api |"
              echo "| Frontend | $frontend |"
              echo "| Reconcilers | $reconcilers |"
              echo "| Labradoor | $labradoor |"
            } >> "$GITHUB_STEP_SUMMARY"

            exit 0
          fi

          # Find base and head, such that we can check diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"

            # GitHub reports an all-zero "before" SHA for some push events, such as
            # the first push to a branch. Use the root commit instead so git diff
            # still has a valid base revision.
            if [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          git diff --name-only "$base" "$head" > changed-files.txt
          cat changed-files.txt

          api=false
          frontend=false
          reconcilers=false
          labradoor=false

          # Check for changed files in given paths. '.nais' is not included since this should not trigger build
          while IFS= read -r file; do
            case "$file" in
              api/*)
                api=true
                ;;
              frontend/*)
                frontend=true
                ;;
              reconcilers/*)
                reconcilers=true
                ;;
              labradoor/*)
                labradoor=true
                ;;
            esac
          done < changed-files.txt

          {
            echo "api=$api"
            echo "frontend=$frontend"
            echo "reconcilers=$reconcilers"
            echo "labradoor=$labradoor"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Detected service changes"
            echo
            echo "| Service | Changed |"
            echo "| --- | --- |"
            echo "| API | $api |"
            echo "| Frontend | $frontend |"
            echo "| Reconcilers | $reconcilers |"
            echo "| Labradoor | $labradoor |"
          } >> "$GITHUB_STEP_SUMMARY"

  api-test:
    name: API / Test
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-api-test
          working_directory: api
      - uses: ./.github/actions/go-cache
        with:
          key: api-test
      - run: mise run build:api
      - run: mise run test

  api-lint:
    name: API / Lint
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-api-lint
          working_directory: api
      - uses: ./.github/actions/go-cache
        with:
          key: api-lint
          restore-keys: api-test
      - run: mise run check:staticcheck
      - run: mise run check:vulncheck
      - name: Check code format and generated files
        run: |
          mise run generate
          mise run fmt
          echo "checking for diff after running generators and formatters, if this fails, run 'mise run generate' and 'mise run fmt'"
          git diff --name-only | grep -v '^package-lock.json$' | xargs -r git diff --exit-code --

  api-build-push:
    name: API / Build and push image
    needs:
      - changes
      - api-test
      - api-lint
    if: ${{ needs.changes.outputs.api == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.triggering_actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-api-build-push
          working_directory: api
      - uses: ./.github/actions/go-cache
        with:
          key: api-build
          restore-keys: api-test
      - name: Build API
        working-directory: api
        run: mise run build:api
      - name: Build and push API image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: api
          image_suffix: api
          tag: ${{ github.sha }}

  frontend:
    name: Frontend / Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run check
      - name: Run tests
        run: pnpm test --run
      - name: Build
        env:
          VITE_GRAPHQL_ENDPOINT: http://dapla-api/graphql
        run: pnpm run build

  frontend-build-push:
    name: Frontend / Build and push image
    needs:
      - changes
      - frontend
    if: ${{ needs.changes.outputs.frontend == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.triggering_actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build and push frontend image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: frontend
          image_suffix: frontend
          tag: ${{ github.sha }}

  reconcilers-test:
    name: Reconcilers / Test
    needs: changes
    if: ${{ needs.changes.outputs.reconcilers == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reconcilers
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-reconcilers-test
          working_directory: reconcilers
      - uses: ./.github/actions/go-cache
        with:
          key: reconcilers-test
      - run: mise run build
      - run: mise run test

  reconcilers-lint:
    name: Reconcilers / Lint
    needs: changes
    if: ${{ needs.changes.outputs.reconcilers == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reconcilers
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-reconcilers-lint
          working_directory: reconcilers
      - uses: ./.github/actions/go-cache
        with:
          key: reconcilers-lint
          restore-keys: reconcilers-test
      - run: mise run check:staticcheck
      - run: mise run check:vulncheck
      - name: Check code format and generated files
        run: |
          mise run fmt ::: generate
          echo "checking for diff after running generators and formatters, if this fails, run 'mise run fmt'"
          git diff --name-only | grep -v '^package-lock.json$' | xargs -r git diff --exit-code --

  reconcilers-build-push:
    name: Reconcilers / Build and push image
    needs:
      - changes
      - reconcilers-test
      - reconcilers-lint
    if: ${{ needs.changes.outputs.reconcilers == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.triggering_actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-reconcilers-build-push
          working_directory: reconcilers
      - uses: ./.github/actions/go-cache
        with:
          key: reconcilers-build
          restore-keys: reconcilers-test
      - name: Build reconcilers
        working-directory: reconcilers
        run: mise run build
      - name: Build and push reconcilers image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: reconcilers
          image_suffix: reconcilers
          tag: ${{ github.sha }}

  labradoor-test:
    name: Labradoor / Test
    needs: changes
    if: ${{ needs.changes.outputs.labradoor == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labradoor
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-labradoor-test
          working_directory: labradoor
      - uses: ./.github/actions/go-cache
        with:
          key: labradoor-test
      - run: mise run build
      - run: mise run test

  labradoor-lint:
    name: Labradoor / Lint
    needs: changes
    if: ${{ needs.changes.outputs.labradoor == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labradoor
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-labradoor-lint
          working_directory: labradoor
      - uses: ./.github/actions/go-cache
        with:
          key: labradoor-lint
          restore-keys: labradoor-test
      - run: mise run check:staticcheck
      - run: mise run check:vulncheck
      - name: Check code format
        run: |
          mise run fmt
          echo "checking for diff after running generators and formatters, if this fails, run 'mise run fmt'"
          git diff --name-only  | xargs -r git diff --exit-code --

  labradoor-build-push:
    name: Labradoor / Build and push image
    needs:
      - changes
      - labradoor-test
      - labradoor-lint
    if: ${{ needs.changes.outputs.labradoor == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.triggering_actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache_key_prefix: mise-labradoor-build-push
          working_directory: labradoor
      - uses: ./.github/actions/go-cache
        with:
          key: labradoor-build
          restore-keys: labradoor-test
      - name: Build labradoor
        working-directory: labradoor
        run: mise run build

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 #v3.0.0
        with:
          workload_identity_provider: "projects/848539402404/locations/global/workloadIdentityPools/gh-actions/providers/gh-actions"
          service_account: "gh-actions-dapla-lab@artifact-registry-5n.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Login to GCP Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          registry: europe-north1-docker.pkg.dev/artifact-registry-5n/dapla-lab-docker
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      - name: Determine Image Tag
        id: set-tag
        run: |
          tag="${GITHUB_SHA}"
          release_build=false

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            release_build=true
          fi

          {
            echo "TAG=${tag}"
            echo "RELEASE_BUILD=${release_build}"
          } >> "$GITHUB_ENV"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Final image tag: ${tag}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        with:
          context: labradoor/.
          platforms: linux/amd64
          file: labradoor/Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            europe-north1-docker.pkg.dev/artifact-registry-5n/dapla-lab-docker/dapla-ctrl-labradoor:${{ steps.set-tag.outputs.tag }}
