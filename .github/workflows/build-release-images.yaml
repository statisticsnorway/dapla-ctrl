name: Build release images

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push API image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: api
          image_suffix: api
          tag: ${{ github.event.release.tag_name }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push frontend image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: frontend
          image_suffix: frontend
          tag: ${{ github.event.release.tag_name }}

  reconcilers:
    name: Reconcilers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push reconcilers image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        with:
          team: dapla-platform
          docker_context: reconcilers
          image_suffix: reconcilers
          tag: ${{ github.event.release.tag_name }}
