name: Build release images

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push API image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a # v0
        with:
          team: dapla-platform
          docker_context: api
          image_suffix: api
          tag: ${{ github.event.release.tag_name }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push frontend image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a # v0
        with:
          team: dapla-platform
          docker_context: frontend
          image_suffix: frontend
          tag: ${{ github.event.release.tag_name }}

  reconcilers:
    name: Reconcilers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push reconcilers image and SBOM to NAIS OCI registry
        uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a # v0
        with:
          team: dapla-platform
          docker_context: reconcilers
          image_suffix: reconcilers
          tag: ${{ github.event.release.tag_name }}

  labradoor:
      name: Labradoor
      runs-on: ubuntu-latest
      permissions:
        contents: read
        id-token: write
      steps:
        - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
          with:
            cache_key_prefix: mise-labradoor-build-push
            working_directory: labradoor
        - uses: ./.github/actions/go-cache
          with:
            key: labradoor-build
            restore-keys: labradoor-test
        - name: Build labradoor
          working-directory: labradoor
          run: mise run build
  
        - id: auth
          name: Authenticate to Google Cloud
          uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 #v3.0.0
          with:
            workload_identity_provider: "projects/848539402404/locations/global/workloadIdentityPools/gh-actions/providers/gh-actions"
            service_account: "gh-actions-dapla-lab@artifact-registry-5n.iam.gserviceaccount.com"
            token_format: "access_token"
  
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0
  
        - name: Login to GCP Artifact Registry
          uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
          with:
            registry: europe-north1-docker.pkg.dev/artifact-registry-5n/dapla-lab-docker
            username: "oauth2accesstoken"
            password: "${{ steps.auth.outputs.access_token }}"
  
        - name: Determine Image Tag
          id: set-tag
          run: |
            tag="${GITHUB_SHA}"
            release_build=false
  
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag="${GITHUB_REF#refs/tags/}"
              release_build=true
            fi
  
            {
              echo "TAG=${tag}"
              echo "RELEASE_BUILD=${release_build}"
            } >> "$GITHUB_ENV"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "Final image tag: ${tag}"
  
        - name: Build and Push Docker Image
          uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
          with:
            context: labradoor/.
            platforms: linux/amd64
            file: labradoor/Dockerfile
            push: true
            provenance: mode=max
            sbom: true
            tags: |
              europe-north1-docker.pkg.dev/artifact-registry-5n/dapla-lab-docker/dapla-ctrl-labradoor:${{ steps.set-tag.outputs.tag }}
