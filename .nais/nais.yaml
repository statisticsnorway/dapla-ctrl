apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: dapla-api
  namespace: dapla-platform
  labels:
    team: dapla-platform
  annotations:
    nais.io/read-only-file-system: "true"
    nais.io/run-as-user: "1001"
spec:
  image: "europe-north1-docker.pkg.dev/nais-management-b3a7/dapla-platform/dapla-api:2025.12.12-10.32-f81081b"

  port: 3000

  accessPolicy:
    inbound:
      rules:
        - application: dapla-ctrl-alt-del
    outbound:
      external:
        - host: auth.test.ssb.no
        - host: login.microsoftonline.com

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"

  replicas:
    max: 2
    min: 1

  readiness:
    path: /healthz
    port: 3005
    failureThreshold: 1
    initialDelay: 5
    periodSeconds: 5

  liveness:
    path: /healthz
    port: 3005
    failureThreshold: 3

  ingresses:
    - https://dapla-ctrl-alt-del.intern.test.ssb.no/graphql
    - https://dapla-ctrl-alt-del.intern.test.ssb.no/oauth2

  env:
    - name: LISTEN_ADDRESS
      value: ":3000"
    - name: INTERNAL_LISTEN_ADDRESS
      value: ":3005"
    - name: GRPC_LISTEN_ADDRESS
      value: ":3001"
    - name: GOOGLE_MANAGEMENT_PROJECT_ID
      value: dapla-platform-t-29
    - name: OAUTH_ISSUER
      value: "https://login.microsoftonline.com/c7217092-b240-4e1d-bd61-fa97ba975cbc/v2.0"
    - name: OAUTH_ADDITIONAL_SCOPES
      value: "upn"
    - name: OAUTH_REDIRECT_URL
      value: "https://dapla-ctrl-alt-del.intern.test.ssb.no/oauth2/callback"
    - name: OAUTH_FRONTEND_URL
      value: "https://dapla-ctrl-alt-del.intern.test.ssb.no"
    - name: LEADER_ELECTION_ENABLED
      value: "false"
    - name: DATABASE_URL
      value: $(DAPLA_API_URL)
    - name: USERSYNC_ADMIN_GROUP
      value: 57448440-d89e-45b7-ab0a-c915d7d8593d
    - name: ENTRA_ID_ALL_USERS_GROUP
      value: 4b59c229-2fe7-465d-a2bf-f9d36071459c
    - name: USERSYNC_ENABLED
      value: "true"

  envFrom:
    - secret: dapla-api

  gcp:
    sqlInstances:
      - type: POSTGRES_17
        tier: db-f1-micro
        databases:
          - name: dapla-api
            envVarPrefix: DAPLA_API
